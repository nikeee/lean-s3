name: CD

on:
  push:
    tags:
      - "v*"

env:
  CI: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm

      - run: npm ci
      - run: npm run ci
      - run: npm test --silent

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    needs: test

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      # `prepublishOnly` runs the build, so `dist/` is produced here.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
