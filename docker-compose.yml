services:
  minio:
    image: minio/minio:latest
    container_name: lean-s3-minio
    restart: unless-stopped
    command: server /data --console-address ":9101"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9101"
    volumes:
      - lean-s3-minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing local/test-bucket;
      exit 0;
      "

volumes:
  lean-s3-minio:
